/* tokens/colors.css */
/* ============================================================
   Moodle Boost — Color tokens
   Boost is Bootstrap 4 with Moodle brand overrides.
   Base palette (Bootstrap grays + Moodle brand) and semantic aliases.
   ============================================================ */

:root {
  /* ---- Brand ---- */
  --moodle-orange: #f98012;        /* Moodle logo / wordmark */
  --moodle-orange-dark: #e8710a;
  --brand-primary: #0f6cbf;        /* Boost primary (links, buttons, active nav) */
  --brand-primary-hover: #0c5aa0;
  --brand-primary-active: #0a4d8a;
  --brand-primary-soft: #e7f0f9;   /* tinted primary background */

  /* ---- Bootstrap gray scale ---- */
  --white: #ffffff;
  --gray-100: #f8f9fa;
  --gray-200: #e9ecef;
  --gray-300: #dee2e6;
  --gray-400: #ced4da;
  --gray-500: #adb5bd;
  --gray-600: #6c757d;
  --gray-700: #495057;
  --gray-800: #343a40;
  --gray-900: #212529;
  --black: #000000;

  /* ---- Semantic status (Moodle Boost overrides of Bootstrap) ---- */
  --success: #357a32;
  --success-soft: #e8f3e8;
  --info: #1f7e9a;
  --info-soft: #e4f1f5;
  --warning: #f0ad4e;
  --warning-soft: #fcf3e6;
  --danger: #ca3120;
  --danger-soft: #f9e7e5;

  /* ---- Semantic aliases ---- */
  --text-body: var(--gray-900);
  --text-muted: var(--gray-600);
  --text-link: var(--brand-primary);
  --text-on-brand: var(--white);
  --text-heading: #1d2125;

  --surface-page: var(--white);
  --surface-card: var(--white);
  --surface-sunken: var(--gray-100);
  --surface-hover: var(--gray-100);
  --surface-navbar: var(--white);

  --border-color: var(--gray-300);
  --border-color-strong: var(--gray-400);
  --divider: var(--gray-200);

  /* ---- Course tile header palette (Moodle auto-generates patterned tiles;
          these flat/gradient stand-ins keep mock courses distinguishable) ---- */
  --course-blue:    #1f6fd0;
  --course-navy:    #2a3f6b;
  --course-cyan:    #1394d6;
  --course-tan:     #c79a5e;
  --course-magenta: #d6107a;
  --course-purple:  #6b3fa0;
  --course-teal:    #138a72;
  --course-amber:   #d98b1e;

  /* ---- Focus ring ---- */
  --focus-ring: rgba(15, 108, 191, 0.35);
}

/* tokens/typography.css */
/* ============================================================
   Moodle Boost — Typography tokens
   Boost ships no webfont; it uses the native system sans stack
   (Bootstrap 4 default). Base size is 0.9375rem (15px).
   ============================================================ */

:root {
  /* ---- Families ---- */
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
    "Helvetica Neue", Arial, "Noto Sans", sans-serif,
    "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
  --font-mono: SFMono-Regular, Menlo, Monaco, Consolas,
    "Liberation Mono", "Courier New", monospace;

  /* ---- Base ---- */
  --font-size-base: 0.9375rem;   /* 15px — Boost body */
  --line-height-base: 1.5;

  /* ---- Type scale (matches Boost heading sizes) ---- */
  --font-size-h1: 1.75rem;       /* page title, e.g. "Dashboard" */
  --font-size-h2: 1.375rem;      /* e.g. "Hi, Samuel!" */
  --font-size-h3: 1.175rem;
  --font-size-h4: 1.0625rem;     /* card headers, e.g. "Timeline" */
  --font-size-h5: 0.9375rem;
  --font-size-h6: 0.8125rem;

  --font-size-lg: 1.0625rem;
  --font-size-sm: 0.8125rem;     /* 13px — meta, captions, course codes */
  --font-size-xs: 0.75rem;       /* 12px — badges */

  /* ---- Weights ---- */
  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-bold: 700;       /* Boost headings are bold */

  /* ---- Line heights ---- */
  --line-height-tight: 1.2;
  --line-height-heading: 1.25;
  --line-height-snug: 1.4;

  /* ---- Letter spacing ---- */
  --letter-spacing-tight: -0.01em;
  --letter-spacing-normal: 0;
}

/* tokens/spacing.css */
/* ============================================================
   Moodle Boost — Spacing, radius, shadow, layout tokens
   Bootstrap 4 spacing scale (rem) + Boost card/border conventions.
   ============================================================ */

:root {
  /* ---- Spacing scale (Bootstrap $spacer = 1rem = 16px) ---- */
  --space-0: 0;
  --space-1: 0.25rem;   /* 4px  */
  --space-2: 0.5rem;    /* 8px  */
  --space-3: 1rem;      /* 16px */
  --space-4: 1.5rem;    /* 24px */
  --space-5: 3rem;      /* 48px */

  /* finer steps used in dense UI */
  --space-1-5: 0.375rem; /* 6px  */
  --space-2-5: 0.75rem;  /* 12px */

  /* ---- Border radius (Bootstrap 4) ---- */
  --radius-sm: 0.2rem;
  --radius: 0.25rem;     /* default — buttons, inputs, cards */
  --radius-lg: 0.3rem;
  --radius-pill: 50rem;  /* pill badges, course filter chips */
  --radius-circle: 50%;

  /* ---- Borders ---- */
  --border-width: 1px;
  --border: var(--border-width) solid var(--border-color);

  /* ---- Shadows (Boost is mostly flat; cards lean on borders) ---- */
  --shadow-sm: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
  --shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);          /* dropdowns, popovers */
  --shadow-lg: 0 1rem 3rem rgba(0, 0, 0, 0.175);        /* modals */
  --shadow-focus: 0 0 0 0.2rem var(--focus-ring);

  /* ---- Layout ---- */
  --navbar-height: 60px;
  --drawer-width: 285px;
  --content-max-width: 830px;   /* Boost reading column */
  --content-max-width-wide: 1140px;
}

/* tokens/base.css */
/* ============================================================
   Moodle Boost — base element styles (Bootstrap 4 reboot, trimmed).
   Applies the body/typography defaults so specimens and kits
   inherit the real Boost look from the global stylesheet.
   ============================================================ */

*,
*::before,
*::after {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: var(--font-sans);
  font-size: var(--font-size-base);
  line-height: var(--line-height-base);
  color: var(--text-body);
  background-color: var(--surface-page);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

h1, h2, h3, h4, h5, h6 {
  margin: 0 0 0.5rem;
  font-weight: var(--font-weight-bold);
  line-height: var(--line-height-heading);
  color: var(--text-heading);
}

h1 { font-size: var(--font-size-h1); }
h2 { font-size: var(--font-size-h2); }
h3 { font-size: var(--font-size-h3); }
h4 { font-size: var(--font-size-h4); }
h5 { font-size: var(--font-size-h5); }
h6 { font-size: var(--font-size-h6); }

p { margin: 0 0 1rem; }

a {
  color: var(--text-link);
  text-decoration: none;
}
a:hover {
  color: var(--brand-primary-hover);
  text-decoration: underline;
}

small { font-size: var(--font-size-sm); }

code, kbd, pre, samp {
  font-family: var(--font-mono);
}

hr {
  border: 0;
  border-top: var(--border);
  margin: 1rem 0;
}

html, body { margin: 0; background: var(--gray-100); }
#root { min-height: 100vh; }
</style>

<script type="text/babel" data-presets="react">

/* ===== auth.jsx ===== */
/* Moodle login + signup screens. Boost auth pages: centered card on a
   plain page, wordmark on top. */
const { Button: MBtn, Input: MInput, Checkbox: MCheck } = window.MoodleBoostDesignSystem_c73480;

const wordmark = window.__WORDMARK;

function AuthShell({ children }) {
  return (
    <div style={{ minHeight: "100%", background: "var(--gray-100)", display: "flex", flexDirection: "column", alignItems: "center", padding: "48px 16px" }}>
      <img src={wordmark} alt="moodle" height="34" style={{ marginBottom: 24 }} />
      <div style={{ width: "100%", maxWidth: 420, background: "#fff", border: "1px solid var(--border-color)", borderRadius: "var(--radius)", boxShadow: "var(--shadow-sm)" }}>
        {children}
      </div>
      <p style={{ marginTop: 22, fontSize: 13, color: "var(--text-muted)" }}>
        moodle.oulu.fi · Oulu University of Applied Sciences
      </p>
    </div>
  );
}

function LoginScreen({ onLogin, onGoSignup }) {
  const [user, setUser] = React.useState("samuel.niva");
  const [pw, setPw] = React.useState("");
  const [err, setErr] = React.useState(false);

  const submit = (e) => {
    e.preventDefault();
    if (!pw) { setErr(true); return; }
    onLogin();
  };

  return (
    <AuthShell>
      <div style={{ padding: "28px 28px 24px" }}>
        <h1 style={{ fontSize: "var(--font-size-h3)", margin: "0 0 4px" }}>Log in</h1>
        <p style={{ fontSize: 14, color: "var(--text-muted)", margin: "0 0 20px" }}>
          Use your university account to continue.
        </p>
        <form onSubmit={submit} style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <MInput label="Username" value={user} onChange={(e) => setUser(e.target.value)}
            icon={<i className="fa-solid fa-user" />} placeholder="firstname.lastname" />
          <MInput label="Password" type="password" value={pw} error={err}
            help={err ? "Please enter your password." : undefined}
            onChange={(e) => { setPw(e.target.value); setErr(false); }}
            icon={<i className="fa-solid fa-lock" />} placeholder="••••••••" />
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <MCheck label="Remember username" defaultChecked />
            <a href="#" style={{ fontSize: 13 }}>Forgotten password?</a>
          </div>
          <MBtn variant="primary" type="submit" block>Log in</MBtn>
        </form>
      </div>
      <div style={{ borderTop: "1px solid var(--border-color)", padding: "16px 28px", background: "var(--gray-100)", borderRadius: "0 0 var(--radius) var(--radius)", textAlign: "center", fontSize: 14 }}>
        New here? <a href="#" onClick={(e) => { e.preventDefault(); onGoSignup(); }}>Create a new account</a>
      </div>
    </AuthShell>
  );
}

function SignupScreen({ onSignup, onGoLogin }) {
  const [f, setF] = React.useState({ first: "", last: "", email: "", user: "", pw: "" });
  const set = (k) => (e) => setF({ ...f, [k]: e.target.value });
  const submit = (e) => { e.preventDefault(); onSignup(); };

  return (
    <AuthShell>
      <div style={{ padding: "28px 28px 24px" }}>
        <h1 style={{ fontSize: "var(--font-size-h3)", margin: "0 0 4px" }}>New account</h1>
        <p style={{ fontSize: 14, color: "var(--text-muted)", margin: "0 0 20px" }}>
          Create your Moodle account to enrol in courses.
        </p>
        <form onSubmit={submit} style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <MInput label="First name" value={f.first} onChange={set("first")} placeholder="Samuel" />
            <MInput label="Surname" value={f.last} onChange={set("last")} placeholder="Niva" />
          </div>
          <MInput label="Email address" type="email" value={f.email} onChange={set("email")} placeholder="you@student.oulu.fi" />
          <MInput label="Username" value={f.user} onChange={set("user")} placeholder="firstname.lastname" />
          <MInput label="Password" type="password" value={f.pw} onChange={set("pw")} help="At least 8 characters." placeholder="••••••••" />
          <MCheck label="I agree to the site policy and terms of use." defaultChecked />
          <MBtn variant="primary" type="submit" block>Create my new account</MBtn>
        </form>
      </div>
      <div style={{ borderTop: "1px solid var(--border-color)", padding: "16px 28px", background: "var(--gray-100)", borderRadius: "0 0 var(--radius) var(--radius)", textAlign: "center", fontSize: 14 }}>
        Already have an account? <a href="#" onClick={(e) => { e.preventDefault(); onGoLogin(); }}>Log in</a>
      </div>
    </AuthShell>
  );
}

Object.assign(window, { LoginScreen, SignupScreen });

/* Dashboard (/my/) — Timeline, Recently accessed courses carousel, mini Calendar.
   Faithful recreation of the reference screenshot. */
const { Card: DCard, EmptyState: DEmpty, CourseCard: DCourse, Select: DSelect, Input: DInput, Button: DBtn, Badge: DBadge } =
  window.MoodleBoostDesignSystem_c73480;

function TimelineCard() {
  const [filter, setFilter] = React.useState("Next 7 days");
  const D = window.MOODLE_DATA;
  const items = filter === "Overdue" ? [] : D.timeline;
  return (
    <DCard title="Timeline" headerRight={
      <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
        <DSelect variant="filter" options={["Overdue", "Next 7 days", "Next 30 days", "All"]} value={filter} onChange={(e) => setFilter(e.target.value)} />
        <DSelect variant="filter" options={["Sort by dates", "Sort by courses"]} defaultValue="Sort by dates" />
      </div>
    }>
      <div style={{ marginBottom: 14 }}>
        <DInput icon={<i className="fa-solid fa-magnifying-glass" />} placeholder="Search by activity type or name" rounded />
      </div>
      {items.length === 0 ? (
        <DEmpty icon="list-check" message="No activities require action" />
      ) : (
        <div style={{ display: "flex", flexDirection: "column" }}>
          {items.map((it, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 14, padding: "12px 4px", borderTop: i ? "1px solid var(--gray-200)" : "0" }}>
              <div style={{ width: 40, height: 40, borderRadius: "var(--radius)", background: `var(--course-${it.color})`, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", flex: "none" }}>
                <i className={`fa-solid ${it.type === "quiz" ? "fa-circle-question" : "fa-file-arrow-up"}`} />
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, color: "var(--text-muted)" }}>{it.due} &middot; {it.courseName}</div>
                <div style={{ fontWeight: 500 }}><a href="#">{it.title}</a></div>
              </div>
              {it.status === "due" && <DBadge variant="soft-danger">Due</DBadge>}
              <DBtn variant="outline" size="sm">Add submission</DBtn>
            </div>
          ))}
        </div>
      )}
    </DCard>
  );
}

function RecentCourses({ onOpen }) {
  const D = window.MOODLE_DATA;
  const scroller = React.useRef(null);
  const scrollBy = (dx) => scroller.current && scroller.current.scrollBy({ left: dx, behavior: "smooth" });
  return (
    <DCard title="Recently accessed courses" headerRight={
      <div style={{ display: "flex", gap: 6 }}>
        <button className="ds-btn ds-btn--outline ds-btn--sm" onClick={() => scrollBy(-260)} aria-label="Previous"><i className="fa-solid fa-chevron-left" /></button>
        <button className="ds-btn ds-btn--outline ds-btn--sm" onClick={() => scrollBy(260)} aria-label="Next"><i className="fa-solid fa-chevron-right" /></button>
      </div>
    }>
      <div ref={scroller} style={{ display: "grid", gridAutoFlow: "column", gridAutoColumns: "190px", gap: 14, overflowX: "auto", paddingBottom: 6 }}>
        {D.courses.map((c) => (
          <DCourse key={c.code} code={c.code} name={c.short} color={c.color} href="#" onClick={(e) => { e.preventDefault(); onOpen && onOpen(c); }} />
        ))}
      </div>
    </DCard>
  );
}

function MiniCalendar({ onOpen }) {
  const D = window.MOODLE_DATA;
  const days = [];
  // June 2026 starts on a Monday (1 = Mon)
  for (let d = 1; d <= 30; d++) days.push(d);
  const dow = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
  return (
    <DCard title="Calendar" headerRight={<DBtn variant="secondary" size="sm">New event</DBtn>}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
        <a href="#" style={{ fontSize: 13 }}>&#9664; May</a>
        <strong style={{ fontSize: 15 }}>June 2026</strong>
        <a href="#" style={{ fontSize: 13 }}>July &#9654;</a>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 1, background: "var(--gray-200)", border: "1px solid var(--gray-200)", borderRadius: "var(--radius)", overflow: "hidden" }}>
        {dow.map((d) => (
          <div key={d} style={{ background: "var(--gray-100)", padding: "6px 4px", fontSize: 11, fontWeight: 700, color: "var(--text-muted)", textAlign: "center" }}>{d}</div>
        ))}
        {days.map((d) => {
          const ev = D.calendar[String(d)];
          return (
            <div key={d} onClick={() => onOpen && onOpen()} style={{ background: "#fff", minHeight: 56, padding: "4px 5px", cursor: "pointer", fontSize: 12 }}>
              <div style={{ color: d === 21 ? "#fff" : "var(--text-body)", fontWeight: 600, width: 20, height: 20, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", background: d === 21 ? "var(--brand-primary)" : "transparent" }}>{d}</div>
              {ev && ev.map((e, i) => (
                <div key={i} style={{ marginTop: 3, fontSize: 11, color: "var(--brand-primary)", display: "flex", alignItems: "center", gap: 4, overflow: "hidden", whiteSpace: "nowrap", textOverflow: "ellipsis" }}>
                  <span style={{ width: 7, height: 7, borderRadius: "50%", background: `var(--${e.color}, var(--course-${e.color}))`, flex: "none" }} />{e.title}
                </div>
              ))}
            </div>
          );
        })}
      </div>
    </DCard>
  );
}

function DashboardScreen({ user, onOpenCourse, onOpenCalendar }) {
  return (
    <div style={{ maxWidth: 830, margin: "0 auto", padding: "28px 20px 60px", display: "flex", flexDirection: "column", gap: 22 }}>
      <div>
        <h1 style={{ margin: "0 0 2px" }}>Dashboard</h1>
        <h2 style={{ margin: 0 }}>Hi, {user.firstName}! <span style={{ fontWeight: 400 }}>&#128075;</span></h2>
      </div>
      <TimelineCard />
      <RecentCourses onOpen={onOpenCourse} />
      <MiniCalendar onOpen={onOpenCalendar} />
    </div>
  );
}

Object.assign(window, { DashboardScreen });


/* ===== courses.jsx ===== */
/* My courses (grid with progress), course catalog (self-enrol), and a course
   detail view that includes the 0-activity student panel (Tutor-system fixture). */
const { Card: CCard, CourseCard: CCourse, Button: CBtn, Badge: CBadge, ProgressBar: CProg, Select: CSelect, Checkbox: CCheck } =
  window.MoodleBoostDesignSystem_c73480;

function MyCoursesScreen({ onOpenCourse, onBrowse }) {
  const D = window.MOODLE_DATA;
  const [view, setView] = React.useState("card");
  return (
    <div style={{ maxWidth: 1140, margin: "0 auto", padding: "28px 20px 60px" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12, marginBottom: 20 }}>
        <h1 style={{ margin: 0 }}>My courses</h1>
        <CBtn variant="primary" onClick={onBrowse}><i className="fa-solid fa-plus" />Enrol in a course</CBtn>
      </div>

      <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap", marginBottom: 18 }}>
        <CSelect variant="filter" options={["All", "In progress", "Future", "Past"]} defaultValue="In progress" />
        <CSelect variant="filter" options={["Sort by course name", "Sort by last accessed"]} />
        <div style={{ flex: 1 }} />
        <div style={{ display: "flex", border: "1px solid var(--border-color-strong)", borderRadius: "var(--radius)", overflow: "hidden" }}>
          <button className="ds-btn ds-btn--sm" onClick={() => setView("card")} style={{ borderRadius: 0, background: view === "card" ? "var(--brand-primary)" : "#fff", color: view === "card" ? "#fff" : "var(--gray-700)" }}><i className="fa-solid fa-table-cells-large" /></button>
          <button className="ds-btn ds-btn--sm" onClick={() => setView("list")} style={{ borderRadius: 0, background: view === "list" ? "var(--brand-primary)" : "#fff", color: view === "list" ? "#fff" : "var(--gray-700)" }}><i className="fa-solid fa-list" /></button>
        </div>
      </div>

      {view === "card" ? (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 18 }}>
          {D.courses.map((c) => (
            <CCourse key={c.code} code={c.code} name={c.short} color={c.color} progress={c.progress} href="#" onClick={(e) => { e.preventDefault(); onOpenCourse(c); }} />

      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {D.courses.map((c) => (
            <CCourse key={c.code} layout="row" code={c.code} name={c.name} color={c.color} progress={c.progress} href="#" onClick={(e) => { e.preventDefault(); onOpenCourse(c); }} />

}

function BrowseScreen({ onEnrol, onBack }) {
  const D = window.MOODLE_DATA;
  const [enrolling, setEnrolling] = React.useState(null);
  return (
    <div style={{ maxWidth: 1140, margin: "0 auto", padding: "28px 20px 60px" }}>
      <a href="#" onClick={(e) => { e.preventDefault(); onBack(); }} style={{ fontSize: 13 }}>&#8592; Back to my courses</a>
      <h1 style={{ margin: "8px 0 4px" }}>Course catalogue</h1>
      <p style={{ color: "var(--text-muted)", marginTop: 0 }}>Self-enrol in available courses for Autumn 2026.</p>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 18, marginTop: 20 }}>
        {D.catalog.map((c) => (
          <CCard key={c.code} noBody>
            <div style={{ height: 88, background: `var(--course-${c.color})`, position: "relative", borderRadius: "var(--radius) var(--radius) 0 0" }}>
              <span style={{ position: "absolute", inset: 0, opacity: .9, backgroundImage: "linear-gradient(135deg, rgba(255,255,255,.16) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.16) 50%, rgba(255,255,255,.16) 75%, transparent 75%)", backgroundSize: "20px 20px", borderRadius: "var(--radius) var(--radius) 0 0" }} />
            </div>
            <div style={{ padding: "14px 16px 16px" }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "var(--text-muted)", textTransform: "uppercase" }}>{c.code}</div>
              <div style={{ fontWeight: 600, margin: "3px 0 8px", lineHeight: 1.35 }}>{c.name}</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 12 }}>
                <CBadge variant="primary" pill>{c.ects} ects</CBadge>
                <CBadge variant="light">{c.term}</CBadge>
                {c.open ? <CBadge variant="soft-success">Open</CBadge> : <CBadge variant="soft-warning">By request</CBadge>}
              </div>
              <div style={{ fontSize: 13, color: "var(--text-muted)", marginBottom: 12 }}>
                <i className="fa-solid fa-user" style={{ marginRight: 6 }} />{c.teacher} &middot; <i className="fa-solid fa-users" style={{ margin: "0 6px 0 4px" }} />{c.students}
              </div>
              <CBtn variant={c.open ? "primary" : "outline"} block onClick={() => setEnrolling(c)}>
                {c.open ? "Enrol me" : "Request access"}
              </CBtn>
            </div>
          </CCard>
        ))}
      </div>

      {enrolling && (
        <EnrolModal course={enrolling} onClose={() => setEnrolling(null)} onConfirm={() => { setEnrolling(null); onEnrol(enrolling); }} />
      )}
    </div>
  );
}

function EnrolModal({ course, onClose, onConfirm }) {
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 16 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ width: "100%", maxWidth: 460, background: "#fff", borderRadius: "var(--radius)", boxShadow: "var(--shadow-lg)", overflow: "hidden" }}>
        <div style={{ padding: "16px 20px", borderBottom: "1px solid var(--border-color)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <h3 style={{ margin: 0, fontSize: "var(--font-size-h4)" }}>Enrolment options</h3>
          <button className="ds-nav__icon" onClick={onClose} aria-label="Close"><i className="fa-solid fa-xmark" /></button>
        </div>
        <div style={{ padding: 20 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "var(--text-muted)", textTransform: "uppercase" }}>{course.code}</div>
          <div style={{ fontWeight: 600, fontSize: 17, margin: "2px 0 4px" }}>{course.name}</div>
          <p style={{ color: "var(--text-muted)", fontSize: 14 }}>Self enrolment ({course.term}). You will be added immediately and can unenrol at any time.</p>
          <div style={{ background: "var(--gray-100)", border: "1px solid var(--border-color)", borderRadius: "var(--radius)", padding: "12px 14px", display: "flex", justifyContent: "space-between", fontSize: 14 }}>
            <span>Teacher</span><strong>{course.teacher}</strong>
          </div>
        </div>
        <div style={{ padding: "14px 20px", borderTop: "1px solid var(--border-color)", background: "var(--gray-100)", display: "flex", justifyContent: "flex-end", gap: 10 }}>
          <CBtn variant="outline" onClick={onClose}>Cancel</CBtn>
          <CBtn variant="primary" onClick={onConfirm}>Enrol me</CBtn>
        </div>
      </div>
    </div>
  );
}

function CourseScreen({ course, onBack }) {

  const za = D.zeroActivity;
  const showZero = course.code === za.course;
  const [tab, setTab] = React.useState("course");
  const [sel, setSel] = React.useState(() => za.students.map(() => true));

  return (
    <div style={{ maxWidth: 1140, margin: "0 auto", padding: "0 0 60px" }}>
      <div style={{ height: 150, background: `var(--course-${course.color})`, position: "relative" }}>
        <span style={{ position: "absolute", inset: 0, opacity: .9, backgroundImage: "linear-gradient(135deg, rgba(255,255,255,.15) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.15) 50%, rgba(255,255,255,.15) 75%, transparent 75%)", backgroundSize: "26px 26px" }} />
      </div>
      <div style={{ padding: "0 20px" }}>
        <div style={{ marginTop: -2, paddingTop: 18 }}>
          <a href="#" onClick={(e) => { e.preventDefault(); onBack(); }} style={{ fontSize: 13 }}>&#8592; My courses</a>
          <div style={{ fontSize: 12, fontWeight: 700, color: "var(--text-muted)", textTransform: "uppercase", marginTop: 8 }}>{course.code}</div>
          <h1 style={{ margin: "2px 0 6px" }}>{course.name}</h1>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>

          </div>
        </div>

        <div style={{ display: "flex", gap: 4, borderBottom: "1px solid var(--border-color)", marginTop: 18 }}>
          {[["course", "Course"], ["grades", "Grades"], showZero && ["activity", "Participants"]].filter(Boolean).map(([k, label]) => (
            <button key={k} onClick={() => setTab(k)} style={{ background: "none", border: "0", borderBottom: tab === k ? "3px solid var(--brand-primary)" : "3px solid transparent", color: tab === k ? "var(--gray-900)" : "var(--gray-600)", fontWeight: tab === k ? 600 : 400, padding: "10px 14px", cursor: "pointer", fontSize: 15 }}>{label}</button>
          ))}
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 300px", gap: 24, marginTop: 24, alignItems: "start" }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
            {tab === "course" && (

                <CCard title="General">

                  <div style={{ marginTop: 14, display: "flex", flexDirection: "column", gap: 8 }}>
                    {["Announcements", "Course outline.pdf", "Week 1 — Introduction"].map((t, i) => (
                      <a key={i} href="#" style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", border: "1px solid var(--border-color)", borderRadius: "var(--radius)", color: "var(--text-body)" }}>
                        <i className={`fa-solid ${["fa-bullhorn", "fa-file-pdf", "fa-book-open"][i]}`} style={{ color: "var(--brand-primary)" }} />{t}
                      </a>
                    ))}
                  </div>
                </CCard>
                <CCard title="Assignment — submit your work">
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>

                    </div>
                    <CBtn variant="primary">Add submission</CBtn>
                  </div>
                </CCard>
              </React.Fragment>
            )}

            {tab === "grades" && (
              <CCard title="Grades" noBody>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14 }}>
                  <thead><tr style={{ background: "var(--gray-100)", textAlign: "left" }}>
                    <th style={{ padding: "10px 16px" }}>Item</th><th style={{ padding: "10px 16px" }}>Status</th><th style={{ padding: "10px 16px" }}>Grade</th>
                  </tr></thead>

Object.assign(window, { MyCoursesScreen, BrowseScreen, CourseScreen });


/* ===== calendar.jsx ===== */
/* Full-page calendar — June 2026 month grid. */
const { Card: CalCard, Button: CalBtn, Select: CalSelect, Badge: CalBadge } = window.MoodleBoostDesignSystem_c73480;

function CalendarScreen() {
  const D = window.MOODLE_DATA;
  const dow = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
  const days = []; for (let d = 1; d <= 30; d++) days.push(d); // June 2026: Mon..
  const colorVar = (c) => (["danger", "warning", "success", "info"].includes(c) ? `var(--${c})` : `var(--course-${c})`);

  return (
    <div style={{ maxWidth: 1140, margin: "0 auto", padding: "28px 20px 60px" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12, marginBottom: 18 }}>
        <h1 style={{ margin: 0 }}>Calendar</h1>
        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          <CalSelect variant="filter" options={["All courses", ...D.courses.map((c) => c.code)]} />
          <CalBtn variant="secondary"><i className="fa-solid fa-plus" />New event</CalBtn>
        </div>
      </div>

      <CalCard noBody>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 18px", borderBottom: "1px solid var(--border-color)" }}>
          <CalBtn variant="outline" size="sm">&#9664; May</CalBtn>
          <strong style={{ fontSize: 18 }}>June 2026</strong>
          <CalBtn variant="outline" size="sm">July &#9654;</CalBtn>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)" }}>
          {dow.map((d) => (
            <div key={d} style={{ padding: "10px 8px", fontSize: 12, fontWeight: 700, color: "var(--text-muted)", textAlign: "right", borderBottom: "1px solid var(--border-color)", borderRight: "1px solid var(--gray-200)" }}>{d}</div>
          ))}
          {days.map((d) => {
            const ev = D.calendar[String(d)] || [];
            const today = d === 21;
            return (
              <div key={d} style={{ minHeight: 116, padding: 8, borderBottom: "1px solid var(--gray-200)", borderRight: "1px solid var(--gray-200)", background: today ? "var(--brand-primary-soft)" : "#fff" }}>
                <div style={{ textAlign: "right", marginBottom: 6 }}>
                  <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 24, height: 24, borderRadius: "50%", fontSize: 13, fontWeight: 600, background: today ? "var(--brand-primary)" : "transparent", color: today ? "#fff" : "var(--text-body)" }}>{d}</span>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  {ev.map((e, i) => (
                    <a key={i} href="#" title={e.course} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, padding: "3px 6px", borderRadius: 3, background: "var(--gray-100)", color: "var(--text-body)", borderLeft: `3px solid ${colorVar(e.color)}`, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                      {e.title}
                    </a>
                  ))}

        <span style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ width: 10, height: 10, borderRadius: 2, background: "var(--course-magenta)" }} />Assignments</span>
        <span style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ width: 10, height: 10, borderRadius: 2, background: "var(--course-navy)" }} />Course events</span>
      </div>
    </div>
  );
}

Object.assign(window, { CalendarScreen });


/* ===== messages.jsx ===== */
/* Messages — tutor conversations. Thread list + active conversation, like
   Moodle's message drawer expanded to a full page. */
const { Avatar: MAvatar, Button: MsgBtn, Input: MsgInput, Badge: MsgBadge } = window.MoodleBoostDesignSystem_c73480;

function MessagesScreen() {
  const D = window.MOODLE_DATA;
  const [active, setActive] = React.useState(D.messages[0].id);
  const [threads, setThreads] = React.useState(D.messages);
  const [draft, setDraft] = React.useState("");
  const current = threads.find((t) => t.id === active);
  const endRef = React.useRef(null);

  React.useEffect(() => { endRef.current && endRef.current.scrollIntoView && endRef.current.scrollTo(0, 1e6); }, [active, current && current.thread.length]);

  const send = (e) => {
    e.preventDefault();
    if (!draft.trim()) return;
    setThreads((ts) => ts.map((t) => t.id === active ? { ...t, thread: [...t.thread, { from: "me", text: draft, time: "Now" }], last: draft } : t));
    setDraft("");
  };

  return (
    <div style={{ maxWidth: 1140, margin: "0 auto", padding: "28px 20px 40px" }}>
      <h1 style={{ margin: "0 0 18px" }}>Messages</h1>
      <div style={{ display: "grid", gridTemplateColumns: "320px 1fr", border: "1px solid var(--border-color)", borderRadius: "var(--radius)", overflow: "hidden", height: 560, background: "#fff" }}>
        {/* thread list */}
        <div style={{ borderRight: "1px solid var(--border-color)", display: "flex", flexDirection: "column", minWidth: 0 }}>
          <div style={{ padding: 12, borderBottom: "1px solid var(--border-color)" }}>
            <MsgInput icon={<i className="fa-solid fa-magnifying-glass" />} placeholder="Search messages" rounded />
          </div>
          <div style={{ overflowY: "auto", flex: 1 }}>
            {threads.map((t) => (
              <button key={t.id} onClick={() => setActive(t.id)} style={{ width: "100%", textAlign: "left", display: "flex", gap: 12, padding: "12px 14px", border: 0, borderBottom: "1px solid var(--gray-200)", background: t.id === active ? "var(--brand-primary-soft)" : "#fff", cursor: "pointer" }}>
                <div style={{ position: "relative", flex: "none" }}>
                  <MAvatar name={t.name} size="md" />
                  {t.online && <span style={{ position: "absolute", bottom: 0, right: 0, width: 10, height: 10, borderRadius: "50%", background: "var(--success)", border: "2px solid #fff" }} />}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", gap: 8 }}>
                    <span style={{ fontWeight: 600, fontSize: 14, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{t.name}</span>
                    <span style={{ fontSize: 11, color: "var(--text-muted)", flex: "none" }}>{t.time}</span>
                  </div>
                  <div style={{ fontSize: 12, color: "var(--text-muted)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{t.last}</div>
                </div>
                {t.unread > 0 && <MsgBadge variant="primary" pill>{t.unread}</MsgBadge>}
              </button>
            ))}
          </div>
        </div>

        {/* conversation */}
        <div style={{ display: "flex", flexDirection: "column", minWidth: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 18px", borderBottom: "1px solid var(--border-color)" }}>
            <MAvatar name={current.name} size="md" />
            <div>
              <div style={{ fontWeight: 600 }}>{current.name}</div>
              <div style={{ fontSize: 12, color: current.online ? "var(--success)" : "var(--text-muted)" }}>{current.online ? "Online" : "Offline"} &middot; {current.role}</div>
            </div>
          </div>

          <div ref={endRef} style={{ flex: 1, overflowY: "auto", padding: 18, background: "var(--gray-100)", display: "flex", flexDirection: "column", gap: 12 }}>
            {current.thread.map((m, i) => (
              <div key={i} style={{ display: "flex", justifyContent: m.from === "me" ? "flex-end" : "flex-start" }}>
                <div style={{ maxWidth: "70%" }}>
                  <div style={{ padding: "9px 13px", borderRadius: 14, fontSize: 14, lineHeight: 1.4, background: m.from === "me" ? "var(--brand-primary)" : "#fff", color: m.from === "me" ? "#fff" : "var(--text-body)", border: m.from === "me" ? "0" : "1px solid var(--border-color)", borderBottomRightRadius: m.from === "me" ? 4 : 14, borderBottomLeftRadius: m.from === "me" ? 14 : 4 }}>{m.text}</div>
                  <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 3, textAlign: m.from === "me" ? "right" : "left" }}>{m.time}</div>
                </div>
              </div>
            ))}
          </div>

          <form onSubmit={send} style={{ display: "flex", gap: 10, padding: 14, borderTop: "1px solid var(--border-color)", alignItems: "center" }}>
            <input value={draft} onChange={(e) => setDraft(e.target.value)} placeholder={`Message ${current.name.split(" ")[0]}…`} className="ds-input" style={{ flex: 1 }} />
            <MsgBtn variant="primary" type="submit"><i className="fa-solid fa-paper-plane" />Send</MsgBtn>
          </form>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { MessagesScreen });

Object.assign(window, { ProfileScreen });


/* ===== App.jsx ===== */
/* App shell: Boost navbar + collapsible left drawer + screen router.
   Wires the auth flow and all signed-in screens together. */
const { Navbar: AppNavbar } = window.MoodleBoostDesignSystem_c73480;

const DRAWER = [
  { key: "dashboard", label: "Dashboard", icon: "fa-gauge" },
  { key: "courses", label: "My courses", icon: "fa-graduation-cap" },
  { key: "calendar", label: "Calendar", icon: "fa-calendar-days" },
  { key: "messages", label: "Messages", icon: "fa-comment-dots" },
  { key: "profile", label: "Profile", icon: "fa-user" },
];

function Drawer({ open, screen, go }) {
  return (
    <aside style={{ width: open ? "var(--drawer-width)" : 0, flex: "none", borderRight: open ? "1px solid var(--border-color)" : "0", background: "#fff", overflow: "hidden", transition: "width .18s ease" }}>
      <nav style={{ width: "var(--drawer-width)", padding: "16px 12px" }}>
        {DRAWER.map((d) => {
          const active = screen === d.key || (screen === "course" && d.key === "courses") || (screen === "browse" && d.key === "courses");
          return (
            <button key={d.key} onClick={() => go(d.key)} style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, padding: "10px 12px", marginBottom: 2, border: 0, borderRadius: "var(--radius)", background: active ? "var(--brand-primary-soft)" : "transparent", color: active ? "var(--brand-primary)" : "var(--gray-800)", fontWeight: active ? 600 : 400, fontSize: 15, cursor: "pointer", textAlign: "left" }}>
              <i className={`fa-solid ${d.icon}`} style={{ width: 18, textAlign: "center" }} />{d.label}
            </button>
          );
        })}
        <div style={{ borderTop: "1px solid var(--gray-200)", margin: "12px 0" }} />
        {["Site home", "Private files", "Grades"].map((t, i) => (
          <a key={i} href="#" style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 12px", color: "var(--gray-700)", fontSize: 14 }}>
            <i className={`fa-solid ${["fa-house", "fa-folder", "fa-table-list"][i]}`} style={{ width: 18, textAlign: "center", color: "var(--gray-500)" }} />{t}
          </a>
        ))}
      </nav>
    </aside>
  );
}

function App() {
  const D = window.MOODLE_DATA;
  const [authed, setAuthed] = React.useState(false);
  const [authScreen, setAuthScreen] = React.useState("login");
  const [screen, setScreen] = React.useState("dashboard");
  const [course, setCourse] = React.useState(null);
  const [drawerOpen, setDrawerOpen] = React.useState(true);
  const [editMode, setEditMode] = React.useState(false);
  const [toast, setToast] = React.useState(null);

  const go = (s) => { setScreen(s); window.scrollTo(0, 0); };
  const openCourse = (c) => { setCourse(c); setScreen("course"); window.scrollTo(0, 0); };
  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2600); };

  if (!authed) {
    return authScreen === "login"
      ? <window.LoginScreen onLogin={() => setAuthed(true)} onGoSignup={() => setAuthScreen("signup")} />
      : <window.SignupScreen onSignup={() => setAuthed(true)} onGoLogin={() => setAuthScreen("login")} />;
  }

  const navLinks = [
    { label: "Dashboard", href: "#", active: screen === "dashboard" },
    { label: "My courses", href: "#", active: ["courses", "course", "browse"].includes(screen) },
  ];

  return (
    <div style={{ minHeight: "100vh", background: "#fff" }}>
      <div style={{ display: "flex", alignItems: "center" }}>
        <button onClick={() => setDrawerOpen((o) => !o)} className="ds-nav__icon" style={{ margin: "0 2px 0 10px", flex: "none" }} aria-label="Toggle navigation"><i className="fa-solid fa-bars" /></button>
        <div style={{ flex: 1 }}>
          <AppNavbar
            links={navLinks}
            user={{ name: D.user.name }}
            messageCount={3}
            notificationCount={0}
            editMode={editMode}
            onToggleEditMode={setEditMode}
          />
        </div>
      </div>

      <div style={{ display: "flex", alignItems: "stretch", minHeight: "calc(100vh - var(--navbar-height))" }}>
        <Drawer open={drawerOpen} screen={screen} go={go} />
        <main style={{ flex: 1, minWidth: 0, background: "#fff" }}>
          {screen === "dashboard" && <window.DashboardScreen user={D.user} onOpenCourse={openCourse} onOpenCalendar={() => go("calendar")} />}
          {screen === "courses" && <window.MyCoursesScreen onOpenCourse={openCourse} onBrowse={() => go("browse")} />}
          {screen === "browse" && <window.BrowseScreen onBack={() => go("courses")} onEnrol={(c) => { go("courses"); showToast(`Enrolled in ${c.code}`); }} />}
          {screen === "course" && course && <window.CourseScreen course={course} onBack={() => go("courses")} />}
          {screen === "calendar" && <window.CalendarScreen />}
          {screen === "messages" && <window.MessagesScreen />}
          {screen === "profile" && <window.ProfileScreen user={D.user} onOpenCourse={openCourse} />}
        </main>
      </div>

      {toast && (
        <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: "var(--success)", color: "#fff", padding: "11px 18px", borderRadius: "var(--radius)", boxShadow: "var(--shadow)", fontSize: 14, display: "flex", alignItems: "center", gap: 10, zIndex: 200 }}>
          <i className="fa-solid fa-circle-check" />{toast}
        </div>
      )}
    </div>
  );
}

// Idempotent mount — reuse the root if scripts re-execute (preview hot-reload).
window.__moodleRoot = window.__moodleRoot || ReactDOM.createRoot(document.getElementById("root"));
window.__moodleRoot.render(<App />);


</script>
</body>
</html>
